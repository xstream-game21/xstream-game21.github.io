<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphicInfinity - Login & Register</title>
    <link rel="stylesheet" href="style_login.css">
</head>
<body>
    <div class="container">
        <div class="curved-shape"></div>
        <div class="curved-shape2"></div>
        
        <!-- LOGIN FORM -->
        <div class="form-box Login">
            <h2 class="animation" style="--D:0; --S:21">Login</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-box animation" style="--D:1; --S:22">
                    <input type="text" id="loginUsername" placeholder=" " required>
                    <label for="">Username</label>
                    <box-icon type='solid' name='user' color="gray"></box-icon>
                </div>
                <div class="input-box animation" style="--D:2; --S:23">
                    <input type="password" id="loginPassword" placeholder=" " required>
                    <label for="">Password</label>
                    <box-icon name='lock-alt' type='solid' color="gray"></box-icon>
                </div>
                <div class="error-message" id="loginError" style="display:none; color: #ff6b6b; font-size: 0.9em; margin-top: 10px; padding: 10px; border-radius: 6px; background-color: rgba(255, 107, 107, 0.1); border-left: 3px solid #ff6b6b;"></div>
                <div class="success-message" id="loginSuccess" style="display:none; color: #6bcf7f; font-size: 0.9em; margin-top: 10px; padding: 10px; border-radius: 6px; background-color: rgba(107, 207, 127, 0.1); border-left: 3px solid #6bcf7f;"></div>
                <div class="input-box animation" style="--D:3; --S:24">
                    <button class="btn" type="submit">Login</button>
                </div>
                <div class="regi-link animation" style="--D:4; --S:25">
                    <p>Don't have an account? <br> <a href="#" class="SignUpLink">Sign Up</a></p>
                </div>
            </form>
        </div>
        
        <div class="info-content Login">
            <h2 class="animation" style="--D:0; --S:20">WELCOME BACK!</h2>
            <p class="animation" style="--D:1; --S:21">We are happy to have you with us again. If you need anything, we are here to help.</p>
        </div>
        
        <!-- REGISTER FORM -->
        <div class="form-box Register">
            <h2 class="animation" style="--li:17; --S:0">Register</h2>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="input-box animation" style="--li:18; --S:1">
                    <input type="text" id="regUsername" placeholder=" " required>
                    <label for="">Username</label>
                    <box-icon type='solid' name='user' color="gray"></box-icon>
                </div>
                <div class="input-box animation" style="--li:19; --S:2">
                    <input type="email" id="regEmail" placeholder=" " required>
                    <label for="">Email</label>
                    <box-icon name='envelope' type='solid' color="gray"></box-icon>
                </div>
                <div class="input-box animation" style="--li:19; --S:3">
                    <input type="password" id="regPassword" placeholder=" " required>
                    <label for="">Password (min 6 characters)</label>
                    <box-icon name='lock-alt' type='solid' color="gray"></box-icon>
                </div>
                <div id="password-strength-status" class="password-strength-status"></div>
                <div class="input-box animation" style="--li:19; --S:3">
                    <input type="password" id="regConfirmPassword" placeholder=" " required>
                    <label for="">Confirm Password</label>
                    <box-icon name='lock-alt' type='solid' color="gray"></box-icon>
                </div>
                <div id="password-match-status" class="password-match-status"></div>
                <div class="error-message" id="registerError" style="display:none; color: #ff6b6b; font-size: 0.9em; margin-top: 10px; padding: 10px; border-radius: 6px; background-color: rgba(255, 107, 107, 0.1); border-left: 3px solid #ff6b6b;"></div>
                <div class="success-message" id="registerSuccess" style="display:none; color: #6bcf7f; font-size: 0.9em; margin-top: 10px; padding: 10px; border-radius: 6px; background-color: rgba(107, 207, 127, 0.1); border-left: 3px solid #6bcf7f;"></div>
                <div class="input-box animation" style="--li:20; --S:4">
                    <button class="btn" type="submit">Register</button>
                </div>
                <div class="regi-link animation" style="--li:21; --S:5">
                    <p>Already have an account? <br> <a href="#" class="SignInLink">Sign In</a></p>
                </div>
            </form>
        </div>
        
        <div class="info-content Register">
            <h2 class="animation" style="--li:17; --S:0">WELCOME!</h2>
            <p class="animation" style="--li:18; --S:1">Create your account and start shopping with us. We offer the best gaming hardware at competitive prices!</p>
        </div>
    </div>

    <script src="login_landingpage.js"></script>
    <script src="users.js"></script>
    <script src="auth.js"></script>
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
    
    <script>
        // Handle Login
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');

            // Clear previous messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            errorDiv.innerText = '';
            successDiv.innerText = '';

            // Validate input
            if (!username || !password) {
                showLoginError('Please enter both username and password!');
                return;
            }

            // Check user credentials
            const loginResult = userDB.loginUser(username, password);

            if (loginResult.success) {
                // Set user as logged in (session storage)
                setUserLoggedIn(username);
                sessionStorage.setItem('userEmail', loginResult.user.email);
                
                // Show success message
                successDiv.innerText = '✅ ' + loginResult.message;
                successDiv.style.display = 'block';

                // Redirect after brief delay
                setTimeout(() => {
                    alert(`Welcome back, ${username}! 🎉`);
                    window.location.href = 'index.html';
                }, 500);
            } else {
                showLoginError(loginResult.message);
            }
        }

        function showLoginError(message) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.innerText = '❌ ' + message;
            errorDiv.style.display = 'block';
        }

        // Handle Register
        function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');

            // Clear previous messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            errorDiv.innerText = '';
            successDiv.innerText = '';

            // Validate input
            if (!username || !email || !password || !confirmPassword) {
                showRegisterError('Please fill in all fields!');
                return;
            }

            // Check username format
            if (username.length < 3) {
                showRegisterError('Username must be at least 3 characters long!');
                return;
            }

            if (username.includes(' ')) {
                showRegisterError('Username cannot contain spaces!');
                return;
            }

            if (!/^[a-zA-Z0-9_-]+$/.test(username)) {
                showRegisterError('Username can only contain letters, numbers, underscores, and hyphens!');
                return;
            }

            // Check if passwords match
            if (password !== confirmPassword) {
                showRegisterError('Passwords do not match!');
                return;
            }

            // Check password length
            if (password.length < 6) {
                showRegisterError('Password must be at least 6 characters long!');
                return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showRegisterError('Please enter a valid email address!');
                return;
            }

            // Register user (saves to localStorage permanently)
            const registerResult = userDB.registerUser(username, email, password);

            if (registerResult.success) {
                successDiv.innerText = '✅ ' + registerResult.message;
                successDiv.style.display = 'block';
                
                // Clear form
                document.getElementById('registerForm').reset();
                
                // Switch to login form after a short delay
                setTimeout(() => {
                    clearRegisterError(); // Clear all registration notifications
                    document.querySelector('.container').classList.remove('active');
                    
                    // Pre-fill username
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('loginPassword').focus();
                }, 500);
            } else {
                showRegisterError(registerResult.message);
            }
        }

        function showRegisterError(message) {
            const errorDiv = document.getElementById('registerError');
            errorDiv.innerText = '❌ ' + message;
            errorDiv.style.display = 'block';
        }

        function checkPasswordStrength(password) {
            const hasLowerCase = /[a-z]/.test(password);
            const hasUpperCase = /[A-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecialChar = /[!@#$%^&*]/.test(password);

            let score = 0;
            if (hasLowerCase) score++;
            if (hasUpperCase) score++;
            if (hasNumber) score++;
            if (hasSpecialChar) score++;

            // Strong: 12+ characters and all four character types
            if (password.length >= 12 && score === 4) {
                return 'strong';
            }
            
            // Medium: 8+ characters and at least 3 character types
            if (password.length >= 8 && score >= 3) {
                return 'medium';
            }

            // Weak: Anything else
            return 'weak';
        }

        // Display registered users count (optional, for testing)
        document.addEventListener('DOMContentLoaded', () => {
            const userCount = Object.keys(userDB.getAllUsers()).length;
            console.log(`Total registered users: ${userCount}`);
            console.log('Registered usernames:', userDB.getAllUsernames());

            const regPasswordInput = document.getElementById('regPassword');
            const regConfirmPasswordInput = document.getElementById('regConfirmPassword');
            const strengthStatus = document.getElementById('password-strength-status');
            const matchStatus = document.getElementById('password-match-status');

            function checkPasswords() {
                const password = regPasswordInput.value;
                const confirmPassword = regConfirmPasswordInput.value;

                // Make the match status visible when the user starts typing
                if (confirmPassword.length > 0) {
                    matchStatus.style.display = 'block';
                } else {
                    matchStatus.style.display = 'none';
                }

                if (password === confirmPassword) {
                    matchStatus.className = 'password-match-status matched';
                    matchStatus.innerText = '✅ Passwords match';
                } else {
                    matchStatus.className = 'password-match-status not-matched';
                    matchStatus.innerText = '❌ Passwords do not match';
                }
            }

            regPasswordInput.addEventListener('input', () => {
                const password = regPasswordInput.value;
                
                if (password.length === 0) {
                    strengthStatus.style.display = 'none';
                    strengthStatus.className = 'password-strength-status';
                    strengthStatus.innerText = '';
                    checkPasswords(); // Also check match status
                    return;
                }

                // Make the strength status visible
                strengthStatus.style.display = 'block';

                const strengthLevel = checkPasswordStrength(password);
                
                strengthStatus.className = `password-strength-status ${strengthLevel}`;
                strengthStatus.innerText = `Strength: ${strengthLevel.charAt(0).toUpperCase() + strengthLevel.slice(1)}`;
                checkPasswords(); // Also check match status
            });

            regConfirmPasswordInput.addEventListener('input', checkPasswords);
        });
    </script>
</body>
</html>
