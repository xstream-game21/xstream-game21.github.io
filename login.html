    <script> 
        const signinBtn = document.querySelector('.signin .links a:last-child'); 
        const signupBtn = document.querySelector('.signup .links a:last-child'); 
        const section = document.querySelector('section'); 

        signupBtn.addEventListener('click', (e) => { 
            e.preventDefault(); 
            section.classList.remove('active'); 
        }); 

        signinBtn.addEventListener('click', (e) => { 
            e.preventDefault(); 
            section.classList.add('active'); 
        }); 
    </script>
